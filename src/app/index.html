<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text2SQL 助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container {
            height: calc(100vh - 200px);
        }
        .message {
            max-width: 80%;
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
        }
        .user-message {
            background-color: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .bot-message {
            background-color: #f3f4f6;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-4xl mx-auto p-4 flex flex-col h-screen">
        <header class="py-6 text-center">
            <h1 class="text-3xl font-bold text-gray-800">🤖 Text2SQL 智能助手</h1>
            <p class="text-gray-600 mt-2">直接输入自然语言，自动为您生成并执行 SQL 查询</p>
        </header>

        <main class="flex-1 overflow-hidden flex flex-col bg-white rounded-lg shadow-lg">
            <div id="chat-box" class="chat-container overflow-y-auto p-4 flex flex-col">
                <!-- 消息将在此显示 -->
                <div class="message bot-message">您好！请问有什么可以帮您的？</div>
            </div>

            <div class="p-4 border-t border-gray-200">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="user-input" 
                        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="输入您的问题，如：统计各部门的人数..." required>
                    <button type="submit" id="send-btn"
                        class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                        发送
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // 显示用户消息
            addMessage(text, true);
            userInput.value = '';
            
            // 禁用按钮并显示加载中状态
            sendBtn.disabled = true;
            sendBtn.textContent = '思考中...';

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: text })
                });

                if (!response.ok) {
                    throw new Error('网络请求错误');
                }

                const data = await response.json();
                addMessage(data.response);
            } catch (error) {
                console.error('Error:', error);
                addMessage('抱歉，发生了一些错误，请稍后再试。');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        });
    </script>
</body>
</html>
